<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Quest - Comic Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="hud">
      <div class="hud-card"><span class="label">Leben</span><span id="lives"></span></div>
      <div class="hud-card"><span class="label">Zeit</span><span id="timer">00:00</span></div>
      <div class="hud-card"><span class="label">Fortschritt</span><span id="progress">0 / 8</span></div>
      <div class="hud-card hint"><span class="label">Hinweis</span><span id="hint">Wähle „Spiel starten“.</span></div>
    </header>

    <main id="screen" class="screen"></main>

    <div id="modal-root"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
